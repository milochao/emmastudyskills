<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f1eee6">
<title>MOVE · All the techniques</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f1eee6; --ink:#2c2b28; --dim:#5f636b; --faint:#767b82;
    --dark:#3a3733;
    --ui:'Inter',system-ui,-apple-system,sans-serif;
    --serif:'Instrument Serif',Georgia,serif;
    --edge:rgba(0,0,0,.22);
    --hairline:rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(120% 100% at 50% 0%, #fbfaf6 0%, var(--bg) 60%); color:var(--ink);
    font-family:var(--ui); overflow:hidden; -webkit-font-smoothing:antialiased; user-select:none; -webkit-user-select:none}
  #wrap{height:100dvh; display:flex; flex-direction:column; align-items:center; position:relative}

  header{width:100%; max-width:1000px; padding:calc(12px + env(safe-area-inset-top)) 20px 4px; display:flex; align-items:baseline; justify-content:space-between; gap:10px; z-index:20}
  .brand{font-family:var(--serif); font-size:21px; letter-spacing:.04em}
  .brand b{font-weight:400} .brand .d{color:#b8863b}
  .ctx{font-size:12.5px; color:var(--dim); text-align:right}

  #stage{flex:1; width:100%; display:flex; align-items:center; justify-content:center;
    padding-bottom:64px;
    perspective:1300px; perspective-origin:50% 42%; cursor:grab; position:relative;
    touch-action:none}
  #stage.grab{cursor:grabbing}

  /* geometry in px is set by JS via --sz; type inside faces is em, scaled off the cube's font-size */
  .cube{position:relative; width:var(--sz); height:var(--sz); transform-style:preserve-3d; will-change:transform}
  .cube.hide{display:none}
  .face{position:absolute; width:var(--sz); height:var(--sz); backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:.6em; box-shadow:inset 0 0 0 1px var(--edge)}

  /* family face (level 1) */
  .fam{cursor:pointer; padding:1.45em; display:flex; flex-direction:column; justify-content:space-between}
  .fam .fnum{font-size:.66em; font-weight:600; letter-spacing:.16em; text-transform:uppercase; opacity:.65}
  .fam .fnm{font-family:var(--serif); font-size:2.4em; line-height:1.0; margin:.18em 0 .24em}
  .fam .fbl{font-size:.84em; line-height:1.45; opacity:.88; font-weight:400}
  .fam .fopen{font-size:.66em; font-weight:600; letter-spacing:.14em; text-transform:uppercase; opacity:.7; margin-top:.8em}

  /* technique tiles (level 2) */
  .tgrid{display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:.45em; padding:.45em; width:100%; height:100%}
  .cell{border:none; border-radius:.4em; cursor:pointer; font-family:var(--ui); font-weight:500; font-size:.8em;
    line-height:1.2; padding:.75em; display:flex; align-items:flex-end; text-align:left;
    box-shadow:inset 0 0 0 1px var(--hairline);
    position:relative; overflow:hidden}
  @media (hover:hover){ .cell:hover{filter:brightness(1.05)} }
  .cell .ic{position:absolute; top:.6em; left:.6em; width:2.2em; height:2.2em; opacity:.78; display:block}
  .cell .ic svg{width:100%; height:100%; stroke-width:1.8}
  .startface{box-shadow:inset 0 0 0 1px var(--edge), inset 0 0 0 3px rgba(255,255,255,.35)}
  .startpill{position:absolute; bottom:1.35em; right:1.45em; z-index:3;
    padding:.45em .85em; border-radius:3px;
    background:rgba(24,23,21,.82); color:#f1eee6; font-family:var(--ui); font-weight:600; font-size:.6em; letter-spacing:.18em; text-transform:uppercase; white-space:nowrap}
  .startcell{box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.7)}
  .stag{position:absolute; top:.75em; right:.75em; z-index:3; padding:.35em .65em; border-radius:3px;
    background:rgba(24,23,21,.82); color:#f1eee6; font-family:var(--ui); font-weight:600; font-size:.62em; letter-spacing:.16em; text-transform:uppercase; white-space:nowrap}
  .cell.empty{pointer-events:none; background:transparent !important;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.09)}

  .hint{position:absolute; bottom:calc(64px + env(safe-area-inset-bottom)); left:0; right:0; text-align:center;
    font-size:12.5px; color:var(--faint); z-index:5; pointer-events:none; transition:opacity .5s}
  .hint.fade{opacity:0}
  .legend{position:absolute; bottom:calc(14px + env(safe-area-inset-bottom)); left:0; right:0;
    display:flex; flex-wrap:wrap; gap:6px 14px; justify-content:center; padding:0 18px; z-index:5}
  .legend.hide{display:none}
  .lg{display:flex; align-items:center; gap:6px; font-size:11px; color:var(--dim)}
  .sw{width:10px; height:10px; border-radius:3px; box-shadow:inset 0 0 0 1px var(--edge)}

  .back{position:absolute; top:calc(50px + env(safe-area-inset-top)); left:16px; z-index:16; display:none; align-items:center; gap:8px;
    background:rgba(0,0,0,.05); border:1px solid rgba(0,0,0,.12); color:var(--ink);
    border-radius:22px; padding:9px 15px; font-size:13.5px; font-weight:600; cursor:pointer}
  .back.on{display:inline-flex}
  @media (hover:hover){ .back:hover{background:rgba(0,0,0,.09)} }

  /* flat panel for families of 6 or fewer: everything visible, no spin */
  .panel{position:relative; border-radius:.6em; padding:.45em; box-shadow:inset 0 0 0 1px var(--edge)}
  .panel.hide{display:none}
  .pgrid{display:grid; grid-template-columns:1fr 1fr; gap:.45em}
  .pgrid .cell{height:10.5em}

  /* soft ground shadow so the shape reads as an object in light */
  .ground{position:absolute; left:50%; transform:translateX(-50%); pointer-events:none;
    background:radial-gradient(50% 50% at 50% 50%, rgba(35,32,28,.20), rgba(35,32,28,0) 72%)}

  /* face pager dots */
  .dots{position:absolute; bottom:calc(40px + env(safe-area-inset-bottom)); left:0; right:0; display:flex; gap:7px; justify-content:center; z-index:5; pointer-events:none}
  .dots.hide{display:none}
  .dot{width:6px; height:6px; border-radius:50%; background:rgba(0,0,0,.18); transition:background .2s, transform .2s}
  .dot.on{background:var(--ink); transform:scale(1.25)}

  /* ---- the card (level 3) ---- */
  #cardWrap{position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center;
    background:rgba(238,235,228,.6); backdrop-filter:blur(4px); padding:18px}
  #cardWrap.on{display:flex}
  .card{--c:#4a5fa5; --cs:#37477c;
    position:relative; width:22em; max-width:min(340px, calc(100vw - 36px)); max-height:min(88vh, calc(100dvh - 36px)); overflow:auto;
    -webkit-overflow-scrolling:touch; overscroll-behavior:contain; touch-action:pan-y;
    background:#fdfcf8; border-radius:12px; padding:1.5em 1.5em 1.3em;
    border:1px solid rgba(0,0,0,.10); border-top:3px solid var(--c);
    box-shadow:0 24px 60px -12px rgba(30,28,24,.28), 0 4px 14px rgba(30,28,24,.10);
    display:flex; flex-direction:column; animation:pop .24s cubic-bezier(.3,1,.4,1)}
  @keyframes pop{from{transform:scale(.96) translateY(10px); opacity:0}to{transform:none; opacity:1}}
  @media (prefers-reduced-motion:reduce){ .card{animation:none} }
  .card::-webkit-scrollbar{width:0}
  .c-head{display:flex; align-items:center; margin-bottom:1em}
  .c-av{width:3.6em; height:3.6em; border-radius:9px; background:color-mix(in srgb, var(--c) 14%, #fdfcf8); flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--c)}
  .c-nm{margin-left:.8em; font-family:var(--serif); font-size:1.6em; font-weight:400; color:var(--ink); line-height:1.02}
  .c-badge{align-self:flex-start; font-size:.62em; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--cs); background:color-mix(in srgb, var(--c) 10%, transparent); border-radius:3px; padding:.45em .8em; margin-bottom:1.1em}
  .c-band{height:1px; background:rgba(0,0,0,.10); margin-bottom:1.1em}
  .c-lab{font-size:.62em; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--cs); margin:.2em 0 .35em}
  .c-txt{font-size:.9em; line-height:1.55; color:var(--ink); font-weight:400; margin-bottom:1.1em}
  .c-src{font-size:.78em; line-height:1.5; color:#8b857a; font-style:italic; font-weight:400; margin-top:.2em}
  .c-btn{margin-top:1.3em; align-self:stretch; background:var(--c); border:none; border-radius:8px; padding:.75em; cursor:pointer;
    font-family:var(--ui); font-weight:600; font-size:.92em; color:#fdfcf8; letter-spacing:.03em;
    transition:background .12s, transform .08s}
  .c-btn:active{transform:translateY(1px); background:var(--cs)}
</style>
</head>

<div id="wrap">
  <header>
    <span class="brand"><b>MOVE</b><span class="d">.</span> the techniques</span>
    <span class="ctx" id="ctx">All 47 · six families</span>
  </header>
  <button class="back" id="back">&larr; Back</button>
  <div id="stage">
    <div class="ground" id="ground"></div>
    <div class="cube" id="cubeF"></div>
    <div class="cube hide" id="cubeT"></div>
    <div class="panel hide" id="panelEl"></div>
  </div>
  <div class="hint" id="hint">Drag to spin. Tap a family to open it.</div>
  <div class="dots hide" id="dots"></div>
  <div class="legend" id="legend"></div>
</div>

<div id="cardWrap"><div class="card" id="card"></div></div>

<script>
"use strict";

const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

const inkFor = hex => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255 > 0.5 ? "#3a3733" : "#ffffff"; };
const shade = (hex,f)=>{ let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.round(r*f); g=Math.round(g*f); b=Math.round(b*f);
  return "#"+[r,g,b].map(x=>Math.max(0,Math.min(255,x)).toString(16).padStart(2,"0")).join(""); };

/* families: index -> face of level-1 cube (0 front,1 right,2 left,3 top,4 bottom,5 back) */
const FAM=[
  {n:"Learn It",    c:"#4a5fa5", bl:"When you're learning something new. Guess first, try it before you study, turn it into a picture, then try to remember it on your own."},
  {n:"Keep It",     c:"#4e7d5b", bl:"Bring old material back after some time so it stays in your head. Guess, wait, then review."},
  {n:"Exam",        c:"#a35248", bl:"Get ready for a test. Mix up the problem types, start with the hardest one, then check your mistakes after."},
  {n:"Stuck",       c:"#b8863b", bl:"When you can't start or you're frozen. This shows you what to do first."},
  {n:"Why It Works",c:"#6d5a94", bl:"How your brain actually learns. The reasons behind the other moves."},
  {n:"Skip These", c:"#75787c", bl:"These feel like studying but don't work. Do the better move instead."},
];

/* every technique. fam = family indices it belongs to. content pulled from the app. */
const T=[
  {n:`Guess First`, fam:[0,1,2], what:`Before you try to remember something, guess how much you think you'll get right. Then find out. The gap between your guess and the real answer shows you what to study next.`, src:`Make It Stick (calibration)`},
  {n:`What's Still Fuzzy`, fam:[0,1,2], what:`Before you stop studying, write down the one thing you still don't understand. That's the first thing to check next time.`, src:`Range (Lovett); Neuroteach (exit ticket)`},

  {n:`Try It First`, fam:[0], what:`Try to answer before you've studied. Getting it wrong first helps you remember the right answer later.`, src:`Make It Stick (generation); pretest before a lecture ~10% better later (E. Bjork); 30% study + 70% reciting beats 100% study (Gates 1917)`},
  {n:`Draw It`, fam:[0], what:`Turn the idea into a picture or a drawing. No words.`, how:`Draw it on paper. Use boxes, arrows, or a simple sketch. Then check the book to see what you missed.`, src:`Dual Coding with Teachers; drawing aids retention (Fernandes 2018, Hu 2015)`},
  {n:`Draw Your Notes`, fam:[0], what:`Take notes using drawings and arrows instead of full sentences. Your hand can draw faster than it can write, so pictures keep up with your thinking.`, src:`profile EC-001 Strategy 04; Dual Coding with Teachers`},
  {n:`Map It`, fam:[0], what:`Lay the material out on paper. Put each piece where it belongs, and draw lines to connect them.`, how:`Build the map on paper. Use space and arrows, not sentences. Do this after you've already tried to remember everything on your own.`, src:`Make It Stick; spatial structures file material`},
  {n:`Memory Walk`, fam:[0], what:`Picture a path you know well, like your walk to school. Place each thing you're trying to remember at a spot along that path. Then walk the path in your head to bring them back.`, how:`Pick one clear picture for each spot on the path. Walk through it in your head. Any spot you can't remember is one to study again.`, src:`Learning How to Learn (Ch 8); Make It Stick (mnemonics)`},
  {n:`Break the Word Apart`, fam:[0], what:`Break a hard word into smaller pieces. The meaning is usually hiding inside the parts.`, how:`Split the word into its pieces and write what each piece means. Put the meaning back together.`, src:`Executive Skills in Reading Comprehension (morphology); profile EC-001 Strategy 03`},
  {n:`Group It Together`, fam:[0], what:`Group a long list into a few small groups with labels. Your brain can only hold about seven things at once, so a group counts as just one thing.`, src:`Learning How to Learn (Miller 1956)`},
  {n:`Write Everything Down`, fam:[0], what:`Close the book and write down everything you remember. Don't stop to check or fix anything.`, how:`Write until you run out. Don't stop to fix mistakes. Then check what you got right, whatever's missing is what to study.`, src:`Powerful Teaching; free recall 67% vs concept-map 45% (Karpicke & Blunt 2011)`},
  {n:`Tell Me Without Looking`, fam:[0], what:`Close the book. Answer questions one at a time, using only your memory.`, src:`Make It Stick; retrieval 71 to 61% vs reread 83 to 40% over a week (Roediger & Karpicke 2006)`},
  {n:`Teach It Simple`, fam:[0], what:`Say it out loud in the simplest words you can, like you're teaching a little kid. No notes.`, how:`Teach it out loud. If you have to check the book, that's the part you don't know yet.`, src:`Protege effect (Stanford teachable agents); output beats input`},
  {n:`Explain Each Step`, fam:[0], what:`Go through it step by step. For each step, say out loud why it's right, not just what it is. This shows you fast where you're confused.`, src:`Learn Better; Understanding How We Learn`},
  {n:`Compare It to Something`, fam:[0], what:`Think about what the idea is like. Finish the sentence: "This is the same as ___." Comparing two things helps you understand both.`, src:`Why Don't Students Like School (Holyoak)`},
  {n:`Make Your Own Example`, fam:[0], what:`Turn the idea into your own real example.`, how:`Write your example on paper. Then write a second, different example. Check that both really fit the rule.`, src:`Understanding How We Learn; Why Don't Students Like School`},
  {n:`Connect It to What You Know`, fam:[0], what:`Connect the new thing to something you already know.`, how:`Finish this sentence with a real connection, not just a matching word: "X is like ___ because ___."`, src:`Make It Stick; elaboration multiplies the cues you can recall by`},

  {n:`Space It Out`, fam:[1], what:`Go back to older material after some time has passed, so you forget a little before you review it.`, src:`Make It Stick; spacing doubles retention at 4 weeks (Rohrer & Taylor 2006)`},
  {n:`Look Back Today`, fam:[1], what:`Look back over what you learned today, the same day, just for a few minutes. A short review now saves a lot of time later.`, src:`Brain Train (RAYL; Ebbinghaus)`},

  {n:`Mix Up the Problems`, fam:[2], what:`Practice different types of problems mixed together. Figure out which type each one is before you solve it.`, src:`Make It Stick; 77% interleaved vs 38% blocked at 24h (Taylor & Rohrer 2010); similar types only`},
  {n:`Start With the Hard One`, fam:[2], what:`On a test, start the hardest question first. Then leave it and do the easy ones. Your brain keeps working on the hard one in the background while you finish the rest.`, src:`Uncommon Sense Teaching (hard-start)`},
  {n:`Check Your Mistakes`, fam:[2], what:`After a test, look at what you got wrong and sort the mistakes into groups. The pattern shows you exactly what to fix next time.`, src:`Ace Your Exam (five error types)`},

  {n:`Get Started`, fam:[3], what:`Starting is the hardest part. Do just the first two minutes, even if you do them badly on purpose. Once you start, it gets easier to keep going.`, src:`Smart but Scattered Teens (task initiation)`},
  {n:`Plan It`, fam:[3], what:`Break the work into steps. Put the steps in order before you start. A plan works better than just trying hard.`, src:`Smart but Scattered Teens (planning)`},
  {n:`Find a Reason to Care`, fam:[3], what:`Before you start, find one reason this matters to you. You remember things better when you care about them.`, src:`Learn Better (learn crafting)`},
  {n:`Set a Goal You Control`, fam:[3], what:`Aim for something you control, like "do ten problems," instead of something you don't, like "get an A."`, src:`Learn Better (process vs outcome goals)`},
  {n:`Study Somewhere New`, fam:[3], what:`Change where you study sometimes. Studying in different places gives your memory more ways to find the answer later.`, src:`How We Learn (context variability)`},
  {n:`Work, Then Rest`, fam:[3], what:`Work hard for about 25 minutes. Then take a real break. The break is when your brain locks in what you learned, it's not wasted time.`, src:`Uncommon Sense Teaching (Pomodoro; brain breaks)`},
  {n:`Take a Walk`, fam:[3], what:`If you're stuck, stop and move around. Your brain keeps working in the background and often hands you the answer later.`, src:`How We Learn (incubation; focused vs diffuse)`},
  {n:`Calm Down First`, fam:[3], what:`When you go from feeling challenged to feeling panicked, stop and take a breath. Feeling challenged is normal, panic isn't. The way out isn't a big push, it's one small first step.`, src:`Neuroteach (amygdala; zone of proximal discomfort); Ace Your Exam`},

  {n:`Fast Brain, Slow Brain`, fam:[4], what:`Some brains work fast but miss small details, like a race car. Some work slower but notice more, like a hiker. Neither one is smarter. If your brain is the fast kind, slowing down on purpose is your advantage.`, src:`Uncommon Sense Teaching`},
  {n:`Two Tricks Your Brain Plays`, fam:[4], what:`Rereading feels easy, so it feels like it's working, but that's a trick. Feeling sure of yourself isn't the same as being right, that's another trick. Guessing before you check catches both.`, src:`Powerful Teaching`},
  {n:`A Little Forgetting Helps`, fam:[4], what:`Forgetting a bit between study sessions isn't a bad sign. The work it takes to remember it again is what makes it stick.`, src:`How We Learn (Bjork)`},
  {n:`New Facts Need Old Facts`, fam:[4], what:`Memory works by making connections. A new fact sticks when it hooks onto something you already know.`, src:`Uncommon Sense Teaching (Hebbian learning)`},
  {n:`Two Kinds of Learning`, fam:[4], what:`Facts and skills are learned in different ways. Skills need practice spread out over time, you can't learn a skill in one night.`, src:`Uncommon Sense Teaching (declarative vs procedural)`},
  {n:`Look Past the Surface`, fam:[4], what:`Beginners sort problems by how they look on the outside. Experts sort by what's really happening underneath. Mixing up problem types trains you to think like an expert.`, src:`Learn Better`},
  {n:`Practice Changes Your Brain`, fam:[4], what:`Practicing something over and over actually speeds up the wiring in your brain. Getting faster is real, it's not just a feeling.`, src:`Neuroteach (myelination)`},
  {n:`Breaks Help You Solve It`, fam:[4], what:`Your brain has a focused mode and a relaxed background mode. A problem you're stuck on often gets solved in the relaxed mode, like on a walk.`, src:`Learning How to Learn (focused vs diffuse)`},
  {n:`You Remember the Start and End`, fam:[4], what:`You remember the beginning and the end of a study session best. Put the most important stuff there, not buried in the middle.`, src:`Neuroteach (primacy-recency)`},
  {n:`Why School Feels Hard`, fam:[4], what:`Your brain grew up learning to talk and read faces, not to read books or do algebra. Those skills take real practice. Struggling with them is normal, not a sign something's wrong.`, src:`Uncommon Sense Teaching (biologically primary vs secondary)`},
  {n:`Mistakes Help You Learn`, fam:[4], what:`Taking a real guess and getting it wrong actually helps your brain remember the right answer later. The wrong try is part of learning, not a failure.`, src:`Learn Better (productive failure, Kapur)`},
  {n:`Learn Facts First`, fam:[4], what:`You can't think deeply about something you barely know. Learning the facts first is what makes deeper thinking possible.`, src:`Why Don't Students Like School`},
  {n:`Smart Grows With Practice`, fam:[4], what:`Being smart isn't something you're born with and stuck with. Effort and the right kind of practice grow it. Your brain actually changes when you push it.`, src:`Neuroteach (growth mindset)`},
  {n:`Sleep Locks In Learning`, fam:[4], what:`Sleep is when your brain files away what you learned that day into long-term memory. Cramming late without sleeping on it barely helps.`, src:`Neuroteach (sleep)`},
  {n:`Leaving It Half-Done Helps`, fam:[4], what:`If you leave a problem half-finished, your brain keeps working on it in the background. You can use that on purpose by stepping away before you're totally stuck.`, src:`How We Learn (Zeigarnik; percolation)`},

  {n:`Reading It Again`, fam:[5], what:`Reading your notes over and over feels like studying, but it mostly isn't. In one study, people who reread scored 40% on a test a week later, and they thought they'd remember more than they actually did. Trying to remember with the book closed is what actually works.`, instead:`Write Everything Down`, src:`Do this instead: Brain Dump`},
  {n:`Highlighting`, fam:[5], what:`Coloring the page with a highlighter feels active, but marking words isn't the same as learning them. A bright page can trick you into thinking you know more than you do.`, instead:`Tell Me Without Looking`, src:`Do this instead: Tell Me Without Looking`},
  {n:`Copying Notes Over`, fam:[5], what:`Rewriting your notes to make them neat is copying, not remembering. A pretty page can trick you into thinking you know more than you do.`, instead:`Map It`, src:`Do this instead: Map It`},
];

/* ---------- one icon per technique (simple monoline glyphs) ---------- */
function svg(inner,sz){ sz=sz||20; return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(inner||'<circle cx="12" cy="12" r="3"/>')+'</svg>'; }
const ICON={
  "Guess First":`<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>`,
  "What's Still Fuzzy":`<line x1="5" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="19" y2="12"/><line x1="5" y1="16" x2="14" y2="16"/>`,
  "Write Everything Down":`<path d="M4 14v4a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4"/><line x1="12" y1="3" x2="12" y2="14"/><polyline points="8 10 12 14 16 10"/>`,
  "Tell Me Without Looking":`<path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6"/><circle cx="12" cy="12" r="2.5"/><line x1="3" y1="3" x2="21" y2="21"/>`,
  "Space It Out":`<line x1="3" y1="12" x2="21" y2="12"/><circle cx="5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="10" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="18" cy="12" r="1.4" fill="currentColor" stroke="none"/>`,
  "Try It First":`<polygon points="13 2 4 14 11 14 10 22 20 10 13 10 13 2"/>`,
  "Draw It":`<path d="M4 20l3-1 11-11-2-2L5 17l-1 3z"/><line x1="14" y1="6" x2="18" y2="10"/>`,

/* ---------- responsive sizing: one number drives geometry and type ---------- */
const stage=document.getElementById("stage");
const cubeF=document.getElementById("cubeF"), cubeT=document.getElementById("cubeT"), panelEl=document.getElementById("panelEl");
let SZ=280, FACE_TF=[];
function sizeCube(){
  const r=stage.getBoundingClientRect();
  /* face-on the cube fits with margin; mid-drag corners may kiss the edges, which reads fine */
  SZ=Math.round(Math.max(190, Math.min(310, (r.width-28)/1.42, (r.height-20)*0.52)));
  stage.style.perspective=(SZ*4.7)+"px";
  const h=SZ/2;
  FACE_TF=[
    `translateZ(${h}px)`,`rotateY(90deg) translateZ(${h}px)`,`rotateY(-90deg) translateZ(${h}px)`,
    `rotateX(90deg) translateZ(${h}px)`,`rotateX(-90deg) translateZ(${h}px)`,`rotateY(180deg) translateZ(${h}px)`
  ];
  [cubeF,cubeT].forEach(c=>{
    c.style.setProperty("--sz",SZ+"px");
    c.style.fontSize=(SZ/280*16)+"px";
  });
  [...cubeF.children].forEach((f,i)=>f.style.transform=FACE_TF[i]);
}

/* ---------- build level-1 (families) cube ---------- */
FAM.forEach((fam,ci)=>{
  const face=document.createElement("div"); face.className="face fam"+(ci===0?" startface":"");
  face.style.background=fam.c; face.style.color=inkFor(fam.c);
  const count=T.filter(t=>t.fam.includes(ci)).length;
  const startPill=ci===0?`<div class="startpill">Start here</div>`:"";
  face.innerHTML=`${startPill}<div><div class="fnum">Family ${ci+1} · ${count} techniques</div>
    <div class="fnm">${fam.n}</div><div class="fbl">${fam.bl}</div></div>
    <div class="fopen">Tap to open &rarr;</div>`;
  face.addEventListener("click",()=>{ if(moved) return; openFamily(ci); });
  cubeF.appendChild(face);
});

/* legend + pager dots */
const legend=document.getElementById("legend");
FAM.forEach(f=>{ const l=document.createElement("div"); l.className="lg";
  l.innerHTML=`<span class="sw" style="background:${f.c}"></span>${f.n}`; legend.appendChild(l); });
const dotsEl=document.getElementById("dots");
function buildDots(n){
  dotsEl.innerHTML="";
  for(let i=0;i<n;i++){ const d=document.createElement("div"); d.className="dot"; dotsEl.appendChild(d); }
  lastDot=-1;
}

/* ---------- level-2: shape follows the count ----------
   <=6 items: flat panel, everything visible, no spin
   <=8 items: flip card, two faces of four
   more:      square prism, four faces of four, one swipe axis */
function makeCell(t,fam,first,ci){
  const cell=document.createElement("button");
  if(t){ cell.className="cell"+(t===first?" startcell":""); cell.style.background=fam.c; cell.style.color=inkFor(fam.c);
    cell.innerHTML=(t===first?'<span class="stag">START HERE</span>':'')+'<span class="ic">'+svg(ICON[t.n])+'</span>'+t.n;
    cell.addEventListener("click",()=>{ if(moved) return; openCard(t,ci); });
  } else { cell.className="cell empty"; cell.style.background=shade(fam.c,0.82); }
  return cell;
}
function openFamily(ci){
  const fam=FAM[ci]; curFam=ci;
  const items=T.filter(t=>t.fam.includes(ci));
  const first=FAM[ci].n==="Skip These"?null:items[0];   /* anti-patterns get no start marker */
  level="family";
  cubeF.classList.add("hide"); legend.classList.add("hide");

  if(items.length<=6){
    /* flat panel */
    shape="panel"; faceCount=1;
    panelEl.innerHTML=""; panelEl.style.background=shade(fam.c,0.9);
    panelEl.style.width=Math.min(SZ*1.18, stage.clientWidth-28)+"px";
    panelEl.style.fontSize=(SZ/280*16)+"px";
    const grid=document.createElement("div"); grid.className="pgrid";
    const slots=Math.ceil(items.length/2)*2;
    for(let k=0;k<slots;k++) grid.appendChild(makeCell(items[k],fam,first,ci));
    panelEl.appendChild(grid);
    cubeT.classList.add("hide"); panelEl.classList.remove("hide");
    stage.style.cursor="default";
    document.getElementById("hint").textContent="Tap a technique for its card.";
  } else {
    /* 3D: flip card (2 faces) or prism (4 faces) */
    const nFaces=items.length<=8?2:4;
    shape=nFaces===2?"flip":"prism"; faceCount=nFaces;
    const depth=nFaces===4?SZ/2:1;
    cubeT.innerHTML="";
    for(let fi=0; fi<nFaces; fi++){
      const face=document.createElement("div"); face.className="face";
      face.style.background=shade(fam.c,0.9);
      face.style.transform=`rotateY(${fi*(360/nFaces)}deg) translateZ(${depth}px)`;
      const grid=document.createElement("div"); grid.className="tgrid";
      for(let k=0;k<4;k++) grid.appendChild(makeCell(items[fi*4+k],fam,first,ci));
      face.appendChild(grid); cubeT.appendChild(face);
    }
    cubeT.classList.remove("hide"); panelEl.classList.add("hide");
    stage.style.cursor="grab";
    document.getElementById("hint").textContent=
      nFaces===2?"Swipe to flip it over. Tap a technique for its card."
                :"Swipe to turn. Tap a technique for its card.";
    buildDots(nFaces);
  }
  document.getElementById("hint").classList.remove("fade");
  setBack(`&larr; All families`); document.getElementById("ctx").textContent=`${fam.n} · ${items.length}`;
  setRotation(0,0);
  updateDots(); placeGround();
}

/* ---------- level-3 (card) ---------- */
function openCard(t,ci){
  const fam=FAM[ci];
  const card=document.getElementById("card");
  card.style.setProperty("--c",fam.c); card.style.setProperty("--cs",shade(fam.c,0.72));
  let body=`<div class="c-lab">What it is</div><div class="c-txt">${t.what}</div>`;
  if(t.how) body+=`<div class="c-lab">How to run it</div><div class="c-txt">${t.how}</div>`;
  if(t.instead) body+=`<div class="c-lab">Do this instead</div><div class="c-txt">${t.instead}</div>`;
  card.innerHTML=`
    <div class="c-head"><div class="c-av">${svg(ICON[t.n],34)}</div><div class="c-nm">${t.n}</div></div>
    <div class="c-badge">${fam.n}</div>
    <div class="c-band"></div>
    ${body}
    <div class="c-lab">Source</div><div class="c-src">${t.src}</div>
    <button class="c-btn" id="cardBack">Back to ${fam.n}</button>`;
  document.getElementById("cardBack").addEventListener("click",closeCard);
  document.getElementById("cardWrap").classList.add("on");
  document.getElementById("ctx").textContent=t.n;
}
function closeCard(){ document.getElementById("cardWrap").classList.remove("on");
  document.getElementById("ctx").textContent=`${FAM[curFam].n} · ${T.filter(t=>t.fam.includes(curFam)).length}`; }
document.getElementById("cardWrap").addEventListener("click",e=>{ if(e.target.id==="cardWrap") closeCard(); });

/* ---------- back / breadcrumb ---------- */
const backBtn=document.getElementById("back");
function setBack(html){ backBtn.innerHTML=html; backBtn.classList.add("on"); }
backBtn.addEventListener("click",()=>{
  if(level==="family"){
    level="families"; shape="cube"; faceCount=6;
    cubeT.classList.add("hide"); panelEl.classList.add("hide"); cubeF.classList.remove("hide");
    legend.classList.remove("hide");
    stage.style.cursor="grab";
    document.getElementById("hint").textContent="Drag to spin. Tap a family to open it.";
    document.getElementById("hint").classList.add("fade");
    document.getElementById("ctx").textContent="All 47 · six families";
    backBtn.classList.remove("on");
    setRotation(-18,-28);      /* rest at the hero angle; snapping resumes after the next drag */
    updateDots(); placeGround();
  }
});

/* ---------- rotation engine ----------
   pointermove only records input; painting happens once per frame in the loop.
   release projects momentum to pick the target face (a committed swipe always
   advances), then a spring that inherits release velocity settles onto it. */
let level="families", curFam=0, moved=false;
let shape="cube", faceCount=6;   /* cube | prism | flip | panel */
let rotX=-18, rotY=-28;          /* current */
let vX=0, vY=0;                  /* velocity, deg/frame */
let down=false, lx=0, ly=0, lt=0, pid=null;
let startX=0, startY=0;          /* rotation at drag start */
let pendX=0, pendY=0;            /* input accumulated since last frame */
let mode="rest";                 /* rest | drag | settle */
let tX=0, tY=0;                  /* settle target */
let rafId=null, lastDot=-1;

const groundEl=document.getElementById("ground");
function placeGround(){
  const el=level==="family"?(shape==="panel"?panelEl:cubeT):cubeF;
  requestAnimationFrame(()=>{
    const sr=stage.getBoundingClientRect(), er=el.getBoundingClientRect();
    groundEl.style.width=(er.width*0.92)+"px";
    groundEl.style.height=Math.max(16, er.width*0.10)+"px";
    groundEl.style.top=(er.bottom - sr.top + er.width*0.02)+"px";
  });
}
function rotatable(){ return !(level==="family" && shape==="panel"); }
function paint(){
  if(!rotatable()) return;
  const el=level==="family"?cubeT:cubeF;
  el.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}
function setRotation(x,y){ rotX=x; rotY=y; vX=vY=0; mode="rest"; lastDot=-1; paint(); }

function snapStepY(){ return shape==="flip"?180:90; }
function refreshDots(){
  if(level!=="family" || faceCount<2) return;
  const step=360/faceCount;
  const fi=((Math.round(-rotY/step))%faceCount+faceCount)%faceCount;
  if(fi!==lastDot){ lastDot=fi; [...dotsEl.children].forEach((d,i)=>d.classList.toggle("on",i===fi)); }
}

/* pick targets from momentum; a committed drag never springs back */
function chooseTargets(){
  const step=snapStepY();
  const projY=rotY + vY*12;                    /* deceleration projection */
  tY=Math.round(projY/step)*step;
  const homeY=Math.round(startY/step)*step;
  const dY=rotY-startY;
  if(tY===homeY && Math.abs(dY)>step*0.22) tY=homeY+Math.sign(dY)*step;
  if(shape==="cube"){
    const projX=rotX + vX*12;
    tX=Math.max(-90,Math.min(90,Math.round(projX/90)*90));
    const homeX=Math.max(-90,Math.min(90,Math.round(startX/90)*90));
    const dX=rotX-startX;
    if(tX===homeX && Math.abs(dX)>20) tX=Math.max(-90,Math.min(90,homeX+Math.sign(dX)*90));
  } else tX=0;
}
function settleTo(x,y){ tX=x; tY=y; mode="settle"; run(); }
function snapSoon(){ chooseTargets(); mode="settle"; run(); }

function tick(){
  if(mode==="drag"){
    rotY+=pendY;
    if(shape==="cube"){
      let nx=rotX+pendX;
      if(nx>90) nx=90+(nx-90)*0.3;             /* rubber band past the pole */
      if(nx<-90) nx=-90+(nx+90)*0.3;
      rotX=nx;
    }
    pendX=pendY=0;
    paint(); refreshDots();
  } else if(mode==="settle"){
    /* spring seeded with release velocity: continuous motion, no hitch */
    vY=vY*0.82+(tY-rotY)*0.09; rotY+=vY;
    vX=vX*0.82+(tX-rotX)*0.09; rotX+=vX;
    if(Math.abs(tY-rotY)<0.05 && Math.abs(vY)<0.05 && Math.abs(tX-rotX)<0.05 && Math.abs(vX)<0.05){
      rotX=tX; rotY=tY; vX=vY=0; mode="rest";
    }
    paint(); refreshDots();
  }
  if(mode==="rest"){ rafId=null; updateDots(); return; }
  rafId=requestAnimationFrame(tick);
}
function run(){ if(rafId===null) rafId=requestAnimationFrame(tick); }
function updateDots(){
  if(level!=="family" || shape==="panel" || faceCount<2){ dotsEl.classList.add("hide"); return; }
  dotsEl.classList.remove("hide"); refreshDots();
}

stage.addEventListener("pointerdown",e=>{
  if(down) return;                             /* ignore a second finger */
  if(document.getElementById("cardWrap").classList.contains("on")) return;
  down=true; moved=false; vX=vY=0; pendX=pendY=0;
  startX=rotX; startY=rotY;
  if(rotatable()){ mode="drag"; stage.classList.add("grab"); run(); }
  lx=e.clientX; ly=e.clientY; lt=performance.now();
  pid=e.pointerId;
});
stage.addEventListener("pointermove",e=>{
  if(!down || e.pointerId!==pid) return;
  const dx=e.clientX-lx, dy=e.clientY-ly;
  if(!moved && Math.hypot(dx,dy)>7){ moved=true; if(rotatable()){ try{ stage.setPointerCapture(pid); }catch(_){} } }
  if(moved && rotatable()){
    const k=0.45;
    pendY+=dx*k;
    if(shape==="cube") pendX+=-dy*k;
    const now=performance.now(), dt=Math.max(1,now-lt);
    const iY=dx*k*(16/dt), iX=shape==="cube"?-dy*k*(16/dt):0;
    vY=vY*0.6+iY*0.4; vX=vX*0.6+iX*0.4;        /* smoothed release velocity */
    lx=e.clientX; ly=e.clientY; lt=now;
    document.getElementById("hint").classList.add("fade");
  }
});
function endDrag(e){
  if(!down || (e && e.pointerId!==pid)) return;
  down=false; pid=null; stage.classList.remove("grab");
  if(!moved || !rotatable()){ mode="rest"; return; }   /* tap, or a flat panel */
  if(REDUCED){ chooseTargets(); rotX=tX; rotY=tY; vX=vY=0; mode="rest"; paint(); updateDots(); return; }
  chooseTargets(); mode="settle"; run();
}
stage.addEventListener("pointerup",endDrag);
stage.addEventListener("pointercancel",endDrag);

/* keyboard: arrows turn one face */
window.addEventListener("keydown",e=>{
  if(document.getElementById("cardWrap").classList.contains("on")){ if(e.key==="Escape") closeCard(); return; }
  if(!rotatable()) return;
  const s2=snapStepY();
  const step={ArrowLeft:[0,s2],ArrowRight:[0,-s2],ArrowUp:[90,0],ArrowDown:[-90,0]}[e.key];
  if(!step) return;
  if(shape!=="cube" && step[0]!==0) return;   /* single-axis shapes ignore up/down */
  const bx=shape==="cube"?Math.max(-90,Math.min(90,Math.round(rotX/90)*90)):0;
  const by=Math.round(rotY/s2)*s2;
  settleTo(shape==="cube"?Math.max(-90,Math.min(90,bx+step[0])):0, by+step[1]);
});

/* ---------- boot ---------- */
sizeCube(); paint(); placeGround();
let rz; window.addEventListener("resize",()=>{ clearTimeout(rz); rz=setTimeout(()=>{
  sizeCube();
  if(level==="family") openFamily(curFam); else { paint(); placeGround(); }
},120); });
</script>
